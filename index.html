<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; border: 2px solid white; border-radius: 50%; display: none; }
        #knob { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 30px; left: 30px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="msg"></div>
        <div id="login" style="display:none;">
            <input type="password" id="pass" placeholder="رمز...">
            <button onclick="check()">ورود</button>
        </div>
    </div>
    <div id="joystick"><div id="knob"></div></div>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const msgs = ["سلام جوجه کوچولو 🐥💕", "این سایتو خودم برات ساختم", "شاید خیلی حرفه‌ای نباشه", "ولی تک‌تک لحظه‌ها به تو فکر می‌کردم"];
        let idx = 0;
        function showMsgs() {
            if(idx < msgs.length) {
                document.getElementById('msg').innerText = msgs[idx++];
                setTimeout(showMsgs, 2500);
            } else { document.getElementById('login').style.display = 'block'; }
        }
        showMsgs();

        function check() {
            if(document.getElementById('pass').value == "1130" || document.getElementById('pass').value == "66") {
                document.getElementById('ui').style.display = 'none';
                document.getElementById('joystick').style.display = 'block';
                initSpace();
            }
        }

        function initSpace() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas')});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // ستاره‌ها
            for(let i=0; i<500; i++) {
                const s = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffffff}));
                s.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
                scene.add(s);
            }
            
            camera.position.z = 5;
            
            // حرکت با جوی‌استیک
            const knob = document.getElementById('knob');
            document.getElementById('joystick').addEventListener('touchmove', (e) => {
                camera.rotation.y += (e.touches[0].clientX - 100) * 0.0001;
                camera.rotation.x += (e.touches[0].clientY - 100) * 0.0001;
            });

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
