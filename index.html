<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: Tahoma, sans-serif; overflow: hidden; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: #000; transition: opacity 1s; }
        .msg { font-size: 20px; margin: 10px; opacity: 0; transition: opacity 1s; }
        input { padding: 10px; border-radius: 20px; border: none; margin-bottom: 10px; text-align: center; }
        button { padding: 10px 30px; border-radius: 20px; border: none; background: #ff4d6d; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="text-container"></div>
        <div id="login-box" style="display:none;">
            <input type="password" id="pass" placeholder="رمز رو وارد کن..." maxlength="4">
            <br>
            <button onclick="check()">ورود به فضا</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const msgs = ["سلام جوجه کوچولو 🐥💕", "اینجا فضایِ اختصاصیِ ماست", "فقط تو و من...", "رمز رو بزن تا ستاره‌مون رو پیدا کنیم"];
        let container = document.getElementById('text-container');
        
        async function runIntro() {
            for(let m of msgs) {
                let div = document.createElement('div');
                div.className = 'msg'; div.innerText = m;
                container.appendChild(div);
                await new Promise(r => setTimeout(r, 500));
                div.style.opacity = 1;
                await new Promise(r => setTimeout(r, 2000));
                div.style.opacity = 0;
            }
            document.getElementById('login-box').style.display = 'block';
        }
        runIntro();

        function check() {
            if(document.getElementById('pass').value == "1130" || document.getElementById('pass').value == "66") {
                document.getElementById('overlay').style.opacity = 0;
                setTimeout(() => document.getElementById('overlay').style.display = 'none', 1000);
                initSpace();
            } else { alert("ای کلک! اشتباهه 😂"); }
        }

        function initSpace() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas'), antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // ستاره‌های رنگی و درخشان
            const geom = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<2000; i++) {
                pos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
            }
            geom.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({size: 0.2, color: 0xffffff});
            scene.add(new THREE.Points(geom, mat));

            // ستاره طلایی مقصد
            const goldStar = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color: 0xffcc00}));
            goldStar.position.set(0, 0, -50);
            scene.add(goldStar);

            camera.position.z = 10;
            
            // حرکت با لمس صفحه
            window.addEventListener('touchmove', (e) => {
                camera.rotation.y += e.changedTouches[0].clientX * 0.00001;
                camera.rotation.x += e.changedTouches[0].clientY * 0.00001;
            });

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
